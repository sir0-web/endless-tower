<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>endless-tower</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="portrait-overlay" style="
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      color: #fff;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      z-index: 9999;
      text-align: center;
    ">📱 横画面にしてください</div>
    <div id="root"></div>
    <script>
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      function checkOrientation() {
        if (!isMobile) return;
        var overlay = document.getElementById('portrait-overlay');
        var root    = document.getElementById('root');
        // orientationchangeの直後はinnerWidth/Hがまだ更新されていないためsetTimeout済み
        var portrait = window.innerHeight > window.innerWidth;
        if (portrait) {
          overlay.style.display = 'flex';
          root.style.display    = 'none';
        } else {
          overlay.style.display = 'none';
          root.style.display    = '';
        }
      }

      // 初回チェック
      checkOrientation();

      // resize はPC向けも含め確実に発火
      window.addEventListener('resize', checkOrientation);

      // Safari の orientationchange は寸法更新が遅れるため100ms待つ
      window.addEventListener('orientationchange', function() {
        setTimeout(checkOrientation, 150);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
